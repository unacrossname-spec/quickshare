name: Release
on:
  push:
    tags: ["v*"]

jobs:
  desktop:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            ext: ''
          - os: windows-latest
            ext: .exe

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Build
        run: cargo build --release --manifest-path src-tauri/Cargo.toml

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: quickshare-${{ matrix.os }}
          path: src-tauri/target/release/quickshare${{ matrix.ext }}

  android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - name: Install Android NDK
        run: sdkmanager 'ndk;27.2.12479018'
      - name: Initialize Android target
        run: cargo tauri android init --ci
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
      - name: Build APK
        run: cargo tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
      - name: Stage APK
        run: cp "$(find src-tauri/gen/android/app/build/outputs/apk -name '*release*.apk' -print -quit)" quickshare-android-arm64.apk
      - uses: actions/upload-artifact@v4
        with:
          name: quickshare-android-arm64
          path: quickshare-android-arm64.apk

  release:
    needs: [desktop, android]
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Rename for release
        run: |
          mv quickshare.exe quickshare-windows-x64.exe 2>/dev/null || true
          mv quickshare quickshare-linux-x64 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            quickshare-windows-x64.exe
            quickshare-linux-x64
            quickshare-android-arm64.apk
