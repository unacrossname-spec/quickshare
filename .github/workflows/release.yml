name: Release
on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            ext: .exe
          - os: ubuntu-latest
            ext: ''

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Build
        run: cargo build --release
        working-directory: src-tauri

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: quickshare-${{ matrix.os }}${{ matrix.ext }}
          path: src-tauri/target/release/quickshare${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Rename files for release
        run: |
          mv quickshare.exe quickshare-windows-latest.exe 2>/dev/null || true
          mv quickshare quickshare-ubuntu-latest 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            quickshare-windows-latest.exe
            quickshare-ubuntu-latest
